name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Generate tag
        id: tag
        run: echo "tag=v$(date -u +'%y%m%d-%H%M')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes

  build:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: matrix-account-tools-x86_64-linux

          - target: x86_64-apple-darwin
            os: macos-13
            artifact: matrix-account-tools-x86_64-macos

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: matrix-account-tools-aarch64-macos

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: matrix-account-tools-x86_64-windows.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config libsqlite3-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/matrix-account-tools ${{ matrix.artifact }}

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/matrix-account-tools.exe ${{ matrix.artifact }}

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" \
            "${{ matrix.artifact }}" \
            --repo "${{ github.repository }}"
